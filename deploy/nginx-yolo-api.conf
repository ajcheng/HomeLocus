# HomeLocus YOLO Vision API 反代（挂到 home.ajcheng.com:8443 的 server 块内）
# YOLO 服务运行在本机 WireGuard：192.168.100.19:8765
#
#   include /etc/nginx/conf.d/nginx-yolo-api.conf;
#
# 生产 Celery 推荐直连 WG：YOLO_API_URL=http://192.168.100.19:8765
# 经 Nginx 外网调试：YOLO_API_URL=https://home.ajcheng.com:8443/yolo-api

    location /yolo-api/ {
        proxy_pass http://192.168.100.19:8765/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
