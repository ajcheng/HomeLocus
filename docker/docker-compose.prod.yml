# Production deployment — all services internal except backend
# Access via nginx reverse proxy: your-domain.com → backend:8000
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homelocus
      POSTGRES_PASSWORD: homelocus
      POSTGRES_DB: homelocus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelocus"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_MASTER_KEY: master-key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    image: homelocus-backend:latest
    ports:
      - "127.0.0.1:8000:8000"   # Only localhost, nginx proxies
    environment:
      DATABASE_URL: "postgresql+asyncpg://homelocus:homelocus@postgres:5432/homelocus"
      DATABASE_URL_SYNC: "postgresql://homelocus:homelocus@postgres:5432/homelocus"
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_PATH: "/data/uploads"
      QDRANT_URL: "http://qdrant:6333"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "master-key"
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_API_KEY: ${AI_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-whisper-1}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-kimi-k2.5}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    volumes:
      - homelocus_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    image: homelocus-backend:latest
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: "postgresql+asyncpg://homelocus:homelocus@postgres:5432/homelocus"
      DATABASE_URL_SYNC: "postgresql://homelocus:homelocus@postgres:5432/homelocus"
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_PATH: "/data/uploads"
      QDRANT_URL: "http://qdrant:6333"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "master-key"
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_API_KEY: ${AI_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-whisper-1}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-kimi-k2.5}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    volumes:
      - homelocus_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    image: homelocus-backend:latest
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: "postgresql+asyncpg://homelocus:homelocus@postgres:5432/homelocus"
      DATABASE_URL_SYNC: "postgresql://homelocus:homelocus@postgres:5432/homelocus"
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "master-key"
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_API_KEY: ${AI_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-whisper-1}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  meili_data:
  qdrant_data:
  homelocus_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/HomeLocus/uploads
