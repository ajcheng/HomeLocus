services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homelocus
      POSTGRES_PASSWORD: homelocus
      POSTGRES_DB: homelocus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelocus"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_MASTER_KEY: master-key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  # ---- Backend (comment out if running locally) ----
  # backend:
  #   build: ../backend
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     DATABASE_URL: "postgresql+asyncpg://homelocus:homelocus@postgres:5432/homelocus"
  #     REDIS_URL: "redis://redis:6379/0"
  #     STORAGE_BACKEND: "local"
  #     STORAGE_LOCAL_PATH: "/data/uploads"
  #     QDRANT_URL: "http://qdrant:6333"
  #     MEILISEARCH_URL: "http://meilisearch:7700"
  #     AI_PROVIDER: "deepseek"
  #     AI_API_KEY: ""
  #   volumes:
  #     - homelocus_uploads:/data/uploads
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
  minio_data:
  qdrant_data:
  meili_data:
  homelocus_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/HomeLocus/uploads
