plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}
android {
    namespace "com.homelocus.homelocus"
    compileSdk 36
    ndkVersion "28.2.13676358"
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
    defaultConfig {
        applicationId "com.homelocus.homelocus"
        minSdk 33
        targetSdk 36
        versionCode 16
        versionName "0.1.16"
    }
    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}
flutter {
    source '../..'
}

// Apply only when Firebase config file exists (copy from google-services.json.example).
if (file("google-services.json").exists()) {
    apply plugin: 'com.google.gms.google-services'
}
